<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vitalii Homoniuk – iOS Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      padding: 48px 20px;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    .header {
      text-align: center;
      margin-bottom: 48px;
    }
    .header h1 {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 17px;
      color: #86868b;
    }
    .app-card {
      display: flex;
      align-items: center;
      background: #fff;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .app-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    }
    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: 16px;
      flex-shrink: 0;
    }
    .app-info {
      margin-left: 16px;
      flex: 1;
    }
    .app-name {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .app-desc {
      font-size: 14px;
      color: #86868b;
      line-height: 1.4;
    }
    .app-badge {
      margin-left: 12px;
      flex-shrink: 0;
    }
    .app-badge svg {
      width: 24px;
      height: 24px;
      color: #86868b;
    }
    footer {
      text-align: center;
      margin-top: 48px;
      font-size: 13px;
      color: #86868b;
    }
    footer a {
      color: #0066cc;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Vitalii Homoniuk</h1>
      <p>iOS Developer</p>
    </div>

    <a class="app-card" href="https://apps.apple.com/app/id6761323728" target="_blank">
      <img class="app-icon" src="tattend.png" alt="Tattend">
      <div class="app-info">
        <div class="app-name">Tattend: Tattoo Aftercare</div>
        <div class="app-desc">Healing tracker & care guide. Day by day, tip by tip.</div>
      </div>
      <div class="app-badge">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <a class="app-card" href="https://apps.apple.com/app/id1628630111" target="_blank">
      <img class="app-icon" src="cardHouse.png" alt="Card House">
      <div class="app-info">
        <div class="app-name">Card House: Spaced Repetition</div>
        <div class="app-desc">Smart flashcards with spaced repetition system.</div>
      </div>
      <div class="app-badge">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <a class="app-card" href="https://apps.apple.com/app/id1664913652" target="_blank">
      <img class="app-icon" src="thePercent.png" alt="The Percent Calculator">
      <div class="app-info">
        <div class="app-name">The Percent Calculator</div>
        <div class="app-desc">Quick and simple percentage calculations.</div>
      </div>
      <div class="app-badge">
        <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
      </div>
    </a>

    <footer>
      <p>&copy; Vitalii Homoniuk</p>
    </footer>
  </div>
</body>
</html>
